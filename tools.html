<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNL Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 16px;
            margin-bottom: 50px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 600px) {
            .tools-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            text-decoration: none;
            color: #fff;
            display: block;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 217, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .tool-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .tool-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #00d9ff;
        }

        .tool-card p {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
        }

        .tool-card .badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(0, 217, 255, 0.2);
            border-radius: 20px;
            font-size: 12px;
            color: #00d9ff;
            margin-top: 15px;
            font-weight: 500;
        }

        .tool-card .badge.new {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .footer {
            margin-top: 50px;
            color: #666;
            font-size: 12px;
        }

        .footer a {
            color: #00d9ff;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛠️</div>
        <h1>GNL Tools</h1>
        <p class="subtitle">Your personal sports betting toolkit</p>

        <div class="tools-grid">
            <!-- Calculator -->
            <a href="./calculator.html" class="tool-card">
                <div class="tool-icon">🧮</div>
                <h2>Calculator</h2>
                <p>Arbitrage calculator with auto-scaling stakes. Enter odds, get guaranteed profit.</p>
                <span class="badge">Updated</span>
            </a>

            <!-- Bankroll Tracker -->
            <a href="./tracker.html" class="tool-card">
                <div class="tool-icon">💰</div>
                <h2>Bankroll Tracker</h2>
                <p>Track deposits, withdrawals, and transfers across all your sportsbooks.</p>
                <span class="badge new">New</span>
            </a>
        </div>

        <div class="footer">
            <p>Built for GNL • 2026</p>
        </div>
    </div>
</body>
</html>
